<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login/Register - Emaan Mart">
    <title>Login & Register - Emaan Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-leaf text-green-500 text-2xl"></i>
                    <a href="index.html" class="text-2xl font-bold text-gray-800">Emaan<span class="text-green-500">Mart</span></a>
                </div>

                <div class="hidden md:flex space-x-6">
                    <a href="index.html" class="text-gray-700 hover:text-green-500 transition">Home</a>
                    <a href="shop.html" class="text-gray-700 hover:text-green-500 transition">Shop</a>
                    <a href="contact.html" class="text-gray-700 hover:text-green-500 transition">Contact</a>
                </div>

                <div class="flex items-center space-x-4">
                    <a href="cart.html" class="text-gray-700 hover:text-green-500 transition text-lg">
                        <i class="fas fa-shopping-cart"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="w-full max-w-md">
            <!-- Tabs -->
            <div class="flex gap-0 border-b-2 border-gray-200 mb-8">
                <button class="tab-btn flex-1 py-3 font-semibold text-gray-700 border-b-2 border-transparent hover:text-green-500 transition" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
                <button class="tab-btn flex-1 py-3 font-semibold text-gray-700 border-b-2 border-transparent hover:text-green-500 transition" onclick="switchTab('register')">
                    <i class="fas fa-user-plus mr-2"></i>Register
                </button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content">
                <div class="bg-white rounded-lg shadow-md p-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Welcome Back!</h2>
                    <form onsubmit="submitLogin(event)">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                            <input type="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="your@email.com">
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Password</label>
                            <input type="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="••••••••">
                        </div>

                        <div class="flex items-center justify-between mb-6">
                            <label class="flex items-center text-gray-600">
                                <input type="checkbox" class="w-4 h-4 text-green-500 rounded">
                                <span class="ml-2">Remember me</span>
                            </label>
                            <a href="#" class="text-green-500 hover:text-green-600 font-semibold">Forgot Password?</a>
                        </div>

                        <button type="submit" class="w-full bg-green-500 text-white py-3 rounded-lg hover:bg-green-600 transition font-bold">
                            Sign In
                        </button>
                    </form>

                    <div class="mt-6">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-300"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-white text-gray-500">Or continue with</span>
                            </div>
                        </div>

                        <div class="mt-6 grid grid-cols-2 gap-3">
                            <button type="button" class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                                <i class="fab fa-google text-red-500 mr-2"></i>
                                <span class="text-sm font-semibold">Google</span>
                            </button>
                            <button type="button" class="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                                <i class="fab fa-facebook text-blue-600 mr-2"></i>
                                <span class="text-sm font-semibold">Facebook</span>
                            </button>
                        </div>
                    </div>

                    <p class="mt-6 text-center text-gray-600">
                        Don't have an account?
                        <button type="button" onclick="switchTab('register')" class="text-green-500 hover:text-green-600 font-semibold">Register here</button>
                    </p>
                </div>
            </div>

            <!-- Register Tab -->
            <div id="register-tab" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow-md p-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Create Account</h2>
                    <form onsubmit="submitRegister(event)">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
                            <input type="text" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Your Name">
                        </div>

                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                            <input type="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="your@email.com">
                        </div>

                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Phone Number</label>
                            <input type="tel" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="+92-3XX-XXXXXXX">
                        </div>

                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2">Password</label>
                            <input type="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="••••••••">
                            <p class="text-xs text-gray-500 mt-1">At least 8 characters with letters and numbers</p>
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 font-semibold mb-2">Confirm Password</label>
                            <input type="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="••••••••">
                        </div>

                        <div class="mb-6">
                            <label class="flex items-center text-gray-600">
                                <input type="checkbox" required class="w-4 h-4 text-green-500 rounded">
                                <span class="ml-2">I agree to the <a href="#" class="text-green-500 hover:underline">Terms & Conditions</a> and <a href="#" class="text-green-500 hover:underline">Privacy Policy</a></span>
                            </label>
                        </div>

                        <button type="submit" class="w-full bg-green-500 text-white py-3 rounded-lg hover:bg-green-600 transition font-bold">
                            Create Account
                        </button>
                    </form>

                    <p class="mt-6 text-center text-gray-600">
                        Already have an account?
                        <button type="button" onclick="switchTab('login')" class="text-green-500 hover:text-green-600 font-semibold">Sign in here</button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-400">© 2026 Emaan Mart. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        function switchTab(tab) {
            // Hide all tabs
            document.getElementById('login-tab').classList.add('hidden');
            document.getElementById('register-tab').classList.add('hidden');

            // Show selected tab
            document.getElementById(tab + '-tab').classList.remove('hidden');

            // Update button styling
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-green-500', 'text-green-500');
                btn.classList.add('border-transparent', 'text-gray-700');
            });
            event.target.classList.remove('border-transparent', 'text-gray-700');
            event.target.classList.add('border-green-500', 'text-green-500');
        }

        function submitLogin(e) {
            e.preventDefault();
            alert('Welcome back! You have been logged in successfully.\n\n(This is a demo - no actual authentication)');
            window.location.href = 'index.html';
        }

        function submitRegister(e) {
            e.preventDefault();
            alert('Account created successfully!\n\nYou can now log in with your credentials.\n\n(This is a demo - no actual account creation)');
            switchTab('login');
        }

        // Set login tab as active by default
        window.addEventListener('load', function() {
            document.querySelectorAll('.tab-btn')[0].classList.add('border-green-500', 'text-green-500');
        });
    </script>
</body>
</html>
